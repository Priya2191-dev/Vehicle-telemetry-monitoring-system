name: Vehicle Telemetry Monitoring System CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout Repository
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. Setup Python
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    # 3. Install Dependencies
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 4. Run Pytest with Coverage & Allure Results
    - name: Run Pytest
      env:
        PYTHONPATH: ${{ github.workspace }}/src
      run: |
        pytest -v --cov=src --cov-report=xml --alluredir=allure-results

    # 5. Run Behave (BDD)
    - name: Run Behave
      env:
        PYTHONPATH: ${{ github.workspace }}/src
      run: |
        behave -f progress -o behave-report.txt

    # 6. Install Allure (Stable version)
    - name: Install Allure
      run: |
        wget https://github.com/allure-framework/allure2/releases/download/2.24.0/allure-2.24.0.tgz
        tar -zxvf allure-2.24.0.tgz
        sudo mv allure-2.24.0 /opt/allure
        sudo ln -s /opt/allure/bin/allure /usr/bin/allure

    # 7. Generate Allure Report
    - name: Generate Allure Report
      run: |
        allure generate allure-results --clean -o allure-report

    # 8. Upload Test Artifacts
    - name: Upload Reports
      uses: actions/upload-artifact@v4
      with:
        name: test-reports
        path: |
          allure-report
          behave-report.txt
          plot.png
          coverage.xml

    # 9. Final Summary
    - name: Test Summary
      run: echo "All tests, BDD scenarios, coverage, and reports executed successfully!"

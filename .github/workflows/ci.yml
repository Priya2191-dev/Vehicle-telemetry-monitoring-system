name: Vehicle Telemetry Monitoring CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout code
    - name: Checkout Repository
      uses: actions/checkout@v3

    # 2. Setup Python
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    # 3. Install dependencies
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 4. Run Pytest (Unit Tests) and BDD test
    - name: Run tests
      env:
        PYTHONPATH: ${{  github.workspace }}/src
      run: |
        pytest -v
        behave -v

    # 6. Generate Test Summary
    - name: Test Summary
      run: echo "All tests executed successfully!"
